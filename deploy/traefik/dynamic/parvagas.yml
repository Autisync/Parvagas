# Traefik dynamic config for Parvagas (FILE provider — Traefik ignores labels).
#
# DEPLOY: copy onto the server as /home/autisync/infra/traefik/dynamic/parvagas.yml
# Traefik watches that folder (watch: true) and reloads automatically.
#
# Routes (both backed by the parvagas-backend stack on the "proxy" network):
#   api.parvagas.pt     -> backend FastAPI  (alias parvagas-backend-api:8000)
#   storage.parvagas.pt -> MinIO S3 API     (alias parvagas-storage:9000)
#
# Prereqs: Cloudflare A records for api.parvagas.pt and storage.parvagas.pt -> server.

http:
  routers:
    parvagas-api:
      rule: "Host(`api.parvagas.pt`)"
      entryPoints:
        - websecure
      service: parvagas-api
      tls:
        certResolver: letsencrypt

    parvagas-storage:
      rule: "Host(`storage.parvagas.pt`)"
      entryPoints:
        - websecure
      service: parvagas-storage
      tls:
        certResolver: letsencrypt

  services:
    parvagas-api:
      loadBalancer:
        servers:
          - url: "http://parvagas-backend-api:8000"

    parvagas-storage:
      loadBalancer:
        servers:
          - url: "http://parvagas-storage:9000"
