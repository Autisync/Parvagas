# Traefik dynamic config for Parvagas (FILE provider).
#
# DEPLOY: copy onto the server as /home/autisync/infra/traefik/dynamic/parvagas.yml
# Traefik watches that folder (watch: true) and reloads automatically — no restart.
#
# SCOPE / SAFETY: this file only defines routers+services for parvagas.pt
# hosts. Traefik loads every *.yml in the dynamic folder independently —
# mailcow.yml, portainer.yml, dashboard.yml, etc. are separate files and are
# never affected by edits here. The letsencrypt certResolver lives in the
# STATIC config (/traefik.yml), which this file only references, never defines.
#
# NAMING (2026-07-10 fix): every service URL below must use the network
# alias the container actually has on the `proxy` network — declared under
# `networks.traefik-net.aliases` in docker-compose.prod.portainer.yml / .dev.yml.
# A previous version of this file guessed different names
# (parvagas-backend-python, parvagas-minio, parvagas-websocket-service…),
# none of which resolve — that was the cause of every api.parvagas.pt 502.
#
#   Router host              Service target                         Compose alias source
#   api.parvagas.pt          http://parvagas-backend-api:8000       backend-python
#   api.parvagas.pt /ws      http://parvagas-websocket:8001         websocket-service
#   cv.parvagas.pt           http://parvagas-cv:3000                cv-builder
#   storage.parvagas.pt      http://parvagas-storage:9000           minio
#   dev-api.parvagas.pt      http://dev-parvagas-backend-api:8000   (docker-compose.dev.yml)
#   dev-cv.parvagas.pt       http://dev-parvagas-cv:3000            (docker-compose.dev.yml)
#   dev-storage.parvagas.pt  http://dev-parvagas-storage:9000       (docker-compose.dev.yml)
#
# The api routers use a plain Host() rule — NO PathPrefix(`/api`) and NO
# strip-prefix middleware. FastAPI mounts its routes at /api/v1/* itself
# (app/api/v1/router.py: APIRouter(prefix="/api/v1")) and additionally serves
# /health and /ready at the root. Stripping /api would 404 every request;
# scoping to PathPrefix(/api) would 404 /health. The /ws router still wins
# for /ws because Traefik ranks routers by rule length (more specific first).

http:
  routers:
    # ─────────────────────────── PRODUCTION ────────────────────────────
    parvagas-api:
      rule: "Host(`api.parvagas.pt`)"
      entryPoints: [websecure]
      service: parvagas-api
      tls:
        certResolver: letsencrypt

    parvagas-websocket:
      rule: "Host(`api.parvagas.pt`) && PathPrefix(`/ws`)"
      entryPoints: [websecure]
      service: parvagas-websocket
      tls:
        certResolver: letsencrypt

    parvagas-cv:
      rule: "Host(`cv.parvagas.pt`)"
      entryPoints: [websecure]
      service: parvagas-cv
      tls:
        certResolver: letsencrypt

    parvagas-storage:
      rule: "Host(`storage.parvagas.pt`)"
      entryPoints: [websecure]
      service: parvagas-storage
      tls:
        certResolver: letsencrypt

    # ─────────────────────────── DEVELOPMENT ───────────────────────────
    # (dev websocket router removed — docker-compose.dev.yml defines no
    # websocket service, so the old router pointed at a nonexistent host.)
    dev-parvagas-api:
      rule: "Host(`dev-api.parvagas.pt`)"
      entryPoints: [websecure]
      service: dev-parvagas-api
      tls:
        certResolver: letsencrypt

    dev-parvagas-cv:
      rule: "Host(`dev-cv.parvagas.pt`)"
      entryPoints: [websecure]
      service: dev-parvagas-cv
      tls:
        certResolver: letsencrypt

    dev-parvagas-storage:
      rule: "Host(`dev-storage.parvagas.pt`)"
      entryPoints: [websecure]
      service: dev-parvagas-storage
      tls:
        certResolver: letsencrypt

  services:
    # ─────────────────────────── PRODUCTION ────────────────────────────
    parvagas-api:
      loadBalancer:
        servers:
          - url: "http://parvagas-backend-api:8000"

    parvagas-websocket:
      loadBalancer:
        servers:
          - url: "http://parvagas-websocket:8001"
        sticky:
          cookie:
            name: "WSID"
            secure: true
            httpOnly: true

    parvagas-cv:
      loadBalancer:
        servers:
          - url: "http://parvagas-cv:3000"

    parvagas-storage:
      loadBalancer:
        servers:
          - url: "http://parvagas-storage:9000"

    # ─────────────────────────── DEVELOPMENT ───────────────────────────
    dev-parvagas-api:
      loadBalancer:
        servers:
          - url: "http://dev-parvagas-backend-api:8000"

    dev-parvagas-cv:
      loadBalancer:
        servers:
          - url: "http://dev-parvagas-cv:3000"

    dev-parvagas-storage:
      loadBalancer:
        servers:
          - url: "http://dev-parvagas-storage:9000"
