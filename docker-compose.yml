name: parvagas-local

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://parvagas:devpass@postgres:5432/parvagas_local}
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY:-dev-admin-key}
  MODERATOR_SIGNUP_KEY: ${MODERATOR_SIGNUP_KEY:-dev-mod-key}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@parvagas.pt}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-cvs-local}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_REGION: ${S3_REGION:-us-east-1}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-dev@parvagas.pt}
  RESUME_PARSER_PROVIDER: ${RESUME_PARSER_PROVIDER:-}
  SKIMA_API_KEY: ${SKIMA_API_KEY:-}
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
  RESUME_BUILDER_URL: ${RESUME_BUILDER_URL:-http://localhost:3050}
  RESUME_BUILDER_SECRET: ${RESUME_BUILDER_SECRET:-dev-cv-builder-secret}
  CV_BUILDER_URL: ${CV_BUILDER_URL:-http://localhost:3050}
  CV_BUILDER_SERVER_SECRET: ${CV_BUILDER_SERVER_SECRET:-dev-cv-builder-server-secret}
  CV_BUILDER_ALLOWED_RETURN_ORIGINS: ${CV_BUILDER_ALLOWED_RETURN_ORIGINS:-http://localhost:3000,http://localhost:3050}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
  OLLAMA_FREE_TIER_ENABLED: ${OLLAMA_FREE_TIER_ENABLED:-true}
  TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}

x-cv-env: &cv-env
  PORT: "3000"
  NODE_ENV: production
  APP_URL: ${RESUME_BUILDER_URL:-http://localhost:3050}
  DATABASE_URL: ${CV_BUILDER_DATABASE_URL:-postgresql://parvagas:devpass@postgres:5432/parvagas_cv_builder_local}
  AUTH_SECRET: ${RESUME_BUILDER_SECRET:-dev-cv-builder-secret}
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume}
  S3_FORCE_PATH_STYLE: "true"
  REDIS_URL: redis://redis:6379
  ENCRYPTION_SECRET: ${CV_BUILDER_ENCRYPTION_SECRET:-dev-cv-builder-encryption-secret-minimum-32-chars}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-Parvagas CV Builder <suporte@parvagas.pt>}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME:-Parvagas}
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  OAUTH_DISCOVERY_URL: ${OAUTH_DISCOVERY_URL:-}
  OAUTH_SCOPES: "openid profile email"
  PARVAGAS_RESUME_SYNC_ENABLED: ${PARVAGAS_RESUME_SYNC_ENABLED:-true}
  PARVAGAS_API_URL: ${PARVAGAS_API_URL:-http://backend:8000}
  PARVAGAS_API_TIMEOUT_MS: ${PARVAGAS_API_TIMEOUT_MS:-10000}
  PARVAGAS_SERVER_SECRET: ${CV_BUILDER_SERVER_SECRET:-dev-cv-builder-server-secret}
  PARVAGAS_API_KEY: ${PARVAGAS_API_KEY:-}
  PARVAGAS_MAIN_URL: ${PARVAGAS_MAIN_URL:-http://localhost:3000}
  PARVAGAS_CANDIDATE_CV_URL: ${PARVAGAS_CANDIDATE_CV_URL:-http://localhost:3000/Portal/Candidato/CV-e-Documentos}
  PARVAGAS_ALLOWED_RETURN_ORIGINS: ${PARVAGAS_ALLOWED_RETURN_ORIGINS:-http://localhost:3000}
  PARVAGAS_RESUME_SYNC_PATH: ${PARVAGAS_RESUME_SYNC_PATH:-/api/v1/integrations/cv-builder/resumes/sync}
  PARVAGAS_AUTH_EXCHANGE_PATH: ${PARVAGAS_AUTH_EXCHANGE_PATH:-/api/v1/cv-builder/exchange}
  PARVAGAS_AUTH_START_FALLBACK_URL: ${PARVAGAS_AUTH_START_FALLBACK_URL:-http://localhost:3000/Login?role=candidate}
  FLAG_DISABLE_SIGNUPS: ${CV_BUILDER_DISABLE_SIGNUPS:-false}
  FLAG_DISABLE_EMAIL_AUTH: ${CV_BUILDER_DISABLE_EMAIL_AUTH:-false}
  FLAG_DISABLE_API_RATE_LIMIT: "false"
  FLAG_SHOW_SPONSORS: "false"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parvagas_local}
      POSTGRES_USER: ${POSTGRES_USER:-parvagas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD:-devpass} psql -h 127.0.0.1 -U $${POSTGRES_USER:-parvagas} -d $${POSTGRES_DB:-parvagas_local} -tAc 'SELECT 1' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  cv-builder-db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-parvagas}
      PGPASSWORD: ${POSTGRES_PASSWORD:-devpass}
      CV_BUILDER_DB: ${CV_BUILDER_DB:-parvagas_cv_builder_local}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      if psql -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='$$CV_BUILDER_DB'\" | grep -q 1; then
        echo 'CV Builder database already exists';
      else
        createdb \"$$CV_BUILDER_DB\";
        echo 'CV Builder database created';
      fi
      "

  cv-builder-bucket-init:
    image: quay.io/minio/mc:latest
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CV_BUILDER_S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume-local}
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'Waiting for MinIO...'; sleep 3; done; mc mb --ignore-existing local/$$CV_BUILDER_S3_BUCKET; mc anonymous set none local/$$CV_BUILDER_S3_BUCKET; echo 'CV Builder bucket ready';

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    restart: unless-stopped
    user: "0:0"
    ports:
      - "8000:8000"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_media:/app/uploads
      - backend_static:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2 -Q default,emails,parsing,cleanup,scraping
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_media:/app/uploads
      - backend_static:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  scheduler:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    profiles: ["frontend"]
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  cv-builder:
    build:
      context: ./reactive-resume
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment: *cv-env
    volumes:
      - cv_builder_data:/app/data
    ports:
      - "3050:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully
      cv-builder-bucket-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_media:
  backend_static:
  cv_builder_data:

networks:
  default: {}
