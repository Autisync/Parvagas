services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Python Backend (New) — REST API on port 8000
  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WebSocket Service — Real-time updates on port 8001
  websocket-service:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: websocket-service
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    mem_limit: 3g
    cpus: "1.5"
    environment:
      - OLLAMA_MODELS=qwen2.5:3b,llama3.2:3b,phi3:mini
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # CV Builder — localhost:3050 (Parvagas-branded Reactive Resume)
  cv-builder:
    build:
      context: ./reactive-resume
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      APP_URL: http://localhost:3050
      AUTH_SECRET: local-cv-builder-auth-secret
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: minio
      STORAGE_PORT: "9000"
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: reactive-resume
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_USE_SSL: "false"
      STORAGE_SKIP_BUCKET_CHECK: "false"
      STORAGE_URL_PREFIX: http://localhost:9000/reactive-resume
      DATABASE_URL: postgresql://parvagas_user:Pr0d_Postgres-Pass_2026_ReplaceMeNow@postgres:5432/parvagas
      ACCESS_TOKEN_SECRET: local-cv-builder-secret
      REFRESH_TOKEN_SECRET: local-cv-builder-refresh
      PUBLIC_URL: http://localhost:3050
      NEXT_PUBLIC_APP_NAME: "Parvagas CV Builder (Local)"
      NEXT_PUBLIC_APP_URL: http://localhost:3050
      MAIL_FROM: noreply@parvagas.pt
      SMTP_URL: smtp://mailhog:1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - cv-builder


  celery-worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    entrypoint: >
      /bin/sh -c "RUN_MIGRATIONS=false exec celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1 -Q default,emails,parsing,cleanup,scraping"
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
  # Celery Beat (Python) - Optional scheduler
  celery-beat:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    entrypoint: >
      /bin/sh -c "RUN_MIGRATIONS=false exec celery -A app.workers.celery_app beat --loglevel=info"
    restart: unless-stopped
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      disable: true
    profiles:
      - python-backend-beat

  db-migrator:
    image: postgres:16-alpine
    profiles: ["migration"]
    env_file:
      - ./.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/migrate-old-db.sh:/migrate-old-db.sh:ro
    entrypoint: ["/bin/sh", "/migrate-old-db.sh"]

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@parvagas.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-REDACTED}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  python_uploads:
  python_logs:
  ollama-data:
  local_cv_data:

