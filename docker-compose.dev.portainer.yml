name: parvagas-dev

x-backend-env: &backend-env
  APP_ENV: development
  DEBUG: "true"
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-parvagas}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-parvagas_dev}}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
  ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY:-dev-admin-key}
  MODERATOR_SIGNUP_KEY: ${MODERATOR_SIGNUP_KEY:-dev-mod-key}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@parvagas.pt}
  FRONTEND_URL: ${FRONTEND_URL:-https://dev.parvagas.pt}
  BACKEND_URL: ${BACKEND_URL:-https://api-dev.parvagas.pt}
  CORS_ORIGIN: ${CORS_ORIGIN:-https://dev.parvagas.pt,https://api-dev.parvagas.pt,https://cv-dev.parvagas.pt}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://storage-dev.parvagas.pt}
  S3_BUCKET: ${S3_BUCKET:-cvs-dev}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-dev@parvagas.pt}
  RESUME_BUILDER_URL: ${RESUME_BUILDER_URL:-https://cv-dev.parvagas.pt}
  RESUME_BUILDER_SECRET: ${RESUME_BUILDER_SECRET:?RESUME_BUILDER_SECRET is required}
  TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
  CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-false}

x-cv-env: &cv-env
  PORT: "3000"
  APP_URL: ${RESUME_BUILDER_URL:-https://cv-dev.parvagas.pt}
  DATABASE_URL: ${CV_BUILDER_DATABASE_URL:-postgresql://${POSTGRES_USER:-parvagas}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${CV_BUILDER_DB:-parvagas_cv_builder_dev}}
  AUTH_SECRET: ${RESUME_BUILDER_SECRET:?RESUME_BUILDER_SECRET is required}
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume-dev}
  S3_FORCE_PATH_STYLE: "true"
  REDIS_URL: redis://redis:6379
  ENCRYPTION_SECRET: ${CV_BUILDER_ENCRYPTION_SECRET:-change-this-cv-builder-encryption-secret}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-Parvagas CV Builder <suporte@parvagas.pt>}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME:-Parvagas}
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  OAUTH_DISCOVERY_URL: ${OAUTH_DISCOVERY_URL:-}
  OAUTH_SCOPES: "openid profile email"
  FLAG_DISABLE_SIGNUPS: ${CV_BUILDER_DISABLE_SIGNUPS:-false}
  FLAG_DISABLE_EMAIL_AUTH: ${CV_BUILDER_DISABLE_EMAIL_AUTH:-false}
  FLAG_DISABLE_API_RATE_LIMIT: "false"
  FLAG_SHOW_SPONSORS: "false"

x-backend-build: &backend-build
  context: ./backend-python
  dockerfile: Dockerfile.dev
  target: api-service

x-cv-build: &cv-build
  context: ./reactive-resume
  dockerfile: Dockerfile.dev

x-cv-migrate-build: &cv-migrate-build
  context: ./reactive-resume
  dockerfile: Dockerfile.dev
  target: builder

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parvagas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-parvagas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - parvagas_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-parvagas} -d $${POSTGRES_DB:-parvagas_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - parvagas_dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - parvagas_dev_minio_data:/data
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-dev-storage
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-dev-storage.rule=Host(`${STORAGE_HOST:-storage-dev.parvagas.pt}`)
      - traefik.http.routers.parvagas-dev-storage.entrypoints=websecure
      - traefik.http.routers.parvagas-dev-storage.tls=true
      - traefik.http.routers.parvagas-dev-storage.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-dev-storage.loadbalancer.server.port=9000

  cv-builder-db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CV_BUILDER_DB: ${CV_BUILDER_DB:-parvagas_cv_builder_dev}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "psql -h postgres -U ${POSTGRES_USER:-parvagas} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='$$CV_BUILDER_DB'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER:-parvagas} -d postgres -c \"CREATE DATABASE $$CV_BUILDER_DB\""
      ]

  cv-builder-bucket-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      CV_BUILDER_S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume-dev}
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 3;
      done;
      mc mb --ignore-existing local/$$CV_BUILDER_S3_BUCKET;
      mc anonymous set none local/$$CV_BUILDER_S3_BUCKET;
      echo 'cv-builder bucket ready';
      "

  cv-builder-migrate:
    build: *cv-migrate-build
    image: ${CV_BUILDER_MIGRATE_IMAGE:-parvagas-cv-builder-migrate:dev}
    restart: "no"
    environment: *cv-env
    command: ["pnpm", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully

  backend:
    build: *backend-build
    image: ${BACKEND_IMAGE:-parvagas-backend:dev}
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parvagas_dev_backend_media:/app/uploads
      - parvagas_dev_backend_static:/app/logs
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-dev-api
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-dev-api.rule=Host(`${API_HOST:-api-dev.parvagas.pt}`)
      - traefik.http.routers.parvagas-dev-api.entrypoints=websecure
      - traefik.http.routers.parvagas-dev-api.tls=true
      - traefik.http.routers.parvagas-dev-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-dev-api.loadbalancer.server.port=8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build: *backend-build
    image: ${WORKER_IMAGE:-parvagas-backend:dev}
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2 -Q default,emails,parsing,cleanup,scraping
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parvagas_dev_backend_media:/app/uploads
      - parvagas_dev_backend_static:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  scheduler:
    build: *backend-build
    image: ${WORKER_IMAGE:-parvagas-backend:dev}
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cv-builder:
    build: *cv-build
    image: ${CV_BUILDER_IMAGE:-parvagas-cv-builder:dev}
    restart: unless-stopped
    environment: *cv-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully
      cv-builder-bucket-init:
        condition: service_completed_successfully
      cv-builder-migrate:
        condition: service_completed_successfully
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-dev-cv
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-dev-cv.rule=Host(`${CV_HOST:-cv-dev.parvagas.pt}`)
      - traefik.http.routers.parvagas-dev-cv.entrypoints=websecure
      - traefik.http.routers.parvagas-dev-cv.tls=true
      - traefik.http.routers.parvagas-dev-cv.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-dev-cv.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped

networks:
  default:
    name: parvagas-dev_internal
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  parvagas_dev_postgres_data:
  parvagas_dev_redis_data:
  parvagas_dev_minio_data:
  parvagas_dev_backend_media:
  parvagas_dev_backend_static:
