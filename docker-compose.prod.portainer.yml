name: parvagas-prod

x-backend-env: &backend-env
  APP_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-parvagas}:${POSTGRES_PASSWORD_URLENC:?POSTGRES_PASSWORD_URLENC is required}@postgres:5432/${POSTGRES_DB:-parvagas}}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY:?ADMIN_SIGNUP_KEY is required}
  MODERATOR_SIGNUP_KEY: ${MODERATOR_SIGNUP_KEY:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@parvagas.pt}
  FRONTEND_URL: ${FRONTEND_URL:-https://parvagas.pt}
  BACKEND_URL: ${BACKEND_URL:-https://api.parvagas.pt}
  CORS_ORIGIN: ${CORS_ORIGIN:-https://parvagas.pt,https://api.parvagas.pt,https://cv.parvagas.pt}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://storage.parvagas.pt}
  S3_BUCKET: ${S3_BUCKET:-cvs}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-true}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  RESUME_BUILDER_URL: ${RESUME_BUILDER_URL:-https://cv.parvagas.pt}
  RESUME_BUILDER_SECRET: ${RESUME_BUILDER_SECRET:?RESUME_BUILDER_SECRET is required}
  CV_BUILDER_URL: ${CV_BUILDER_URL:-https://cv.parvagas.pt}
  CV_BUILDER_SERVER_SECRET: ${CV_BUILDER_SERVER_SECRET:?CV_BUILDER_SERVER_SECRET is required}
  CV_BUILDER_ALLOWED_RETURN_ORIGINS: ${CV_BUILDER_ALLOWED_RETURN_ORIGINS:-https://parvagas.pt,https://cv.parvagas.pt}
  TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
  GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-45}
  GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-800}
  GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-80}

x-cv-env: &cv-env
  PORT: "3000"
  NODE_ENV: production
  APP_URL: ${RESUME_BUILDER_URL:-https://cv.parvagas.pt}
  DATABASE_URL: ${CV_BUILDER_DATABASE_URL:-postgresql://${POSTGRES_USER:-parvagas}:${POSTGRES_PASSWORD_URLENC:?POSTGRES_PASSWORD_URLENC is required}@postgres:5432/${CV_BUILDER_DB:-parvagas_cv_builder}}
  AUTH_SECRET: ${RESUME_BUILDER_SECRET:?RESUME_BUILDER_SECRET is required}
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume}
  S3_FORCE_PATH_STYLE: "true"
  REDIS_URL: redis://redis:6379
  ENCRYPTION_SECRET: ${CV_BUILDER_ENCRYPTION_SECRET:-change-this-cv-builder-encryption-secret}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-Parvagas CV Builder <suporte@parvagas.pt>}
  SMTP_SECURE: ${SMTP_SECURE:-true}
  OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME:-Parvagas}
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  OAUTH_DISCOVERY_URL: ${OAUTH_DISCOVERY_URL:-}
  OAUTH_SCOPES: "openid profile email"
  PARVAGAS_RESUME_SYNC_ENABLED: ${PARVAGAS_RESUME_SYNC_ENABLED:-true}
  PARVAGAS_API_URL: ${PARVAGAS_API_URL:-https://api.parvagas.pt}
  PARVAGAS_API_TIMEOUT_MS: ${PARVAGAS_API_TIMEOUT_MS:-10000}
  PARVAGAS_SERVER_SECRET: ${CV_BUILDER_SERVER_SECRET:?CV_BUILDER_SERVER_SECRET is required}
  PARVAGAS_API_KEY: ${PARVAGAS_API_KEY:-}
  PARVAGAS_MAIN_URL: ${PARVAGAS_MAIN_URL:-https://parvagas.pt}
  PARVAGAS_CANDIDATE_CV_URL: ${PARVAGAS_CANDIDATE_CV_URL:-https://parvagas.pt/Portal/Candidato/CV-e-Documentos}
  PARVAGAS_ALLOWED_RETURN_ORIGINS: ${PARVAGAS_ALLOWED_RETURN_ORIGINS:-https://parvagas.pt}
  PARVAGAS_RESUME_SYNC_PATH: ${PARVAGAS_RESUME_SYNC_PATH:-/api/v1/integrations/cv-builder/resumes/sync}
  PARVAGAS_AUTH_EXCHANGE_PATH: ${PARVAGAS_AUTH_EXCHANGE_PATH:-/api/v1/cv-builder/exchange}
  PARVAGAS_AUTH_START_FALLBACK_URL: ${PARVAGAS_AUTH_START_FALLBACK_URL:-https://parvagas.pt/Login?role=candidate}
  FLAG_DISABLE_SIGNUPS: ${CV_BUILDER_DISABLE_SIGNUPS:-true}
  FLAG_DISABLE_EMAIL_AUTH: ${CV_BUILDER_DISABLE_EMAIL_AUTH:-true}
  FLAG_DISABLE_API_RATE_LIMIT: "false"
  FLAG_SHOW_SPONSORS: "false"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parvagas}
      POSTGRES_USER: ${POSTGRES_USER:-parvagas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - parvagas_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U $${POSTGRES_USER:-parvagas} -d $${POSTGRES_DB:-parvagas} -tAc 'SELECT 1' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - parvagas_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - parvagas_prod_minio_data:/data
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-prod-storage
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-prod-storage.rule=Host(`${STORAGE_HOST:-storage.parvagas.pt}`)
      - traefik.http.routers.parvagas-prod-storage.entrypoints=websecure
      - traefik.http.routers.parvagas-prod-storage.tls=true
      - traefik.http.routers.parvagas-prod-storage.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-prod-storage.loadbalancer.server.port=9000

  cv-builder-db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-parvagas}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CV_BUILDER_DB: ${CV_BUILDER_DB:-parvagas_cv_builder}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      if psql -tAc \"SELECT 1 FROM pg_database WHERE datname='$$CV_BUILDER_DB'\" | grep -q 1; then
        echo 'CV Builder database already exists';
      else
        createdb \"$$CV_BUILDER_DB\";
        echo 'CV Builder database created';
      fi
      "

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      BACKEND_BUCKET: ${S3_BUCKET:-cvs}
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        sleep 3;
      done;
      mc mb --ignore-existing local/$$BACKEND_BUCKET;
      mc anonymous set none local/$$BACKEND_BUCKET;
      echo 'backend bucket ready';
      "

  cv-builder-bucket-init:
    image: quay.io/minio/mc:latest
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      CV_BUILDER_S3_BUCKET: ${CV_BUILDER_S3_BUCKET:-reactive-resume}
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'Waiting for MinIO...'; sleep 3; done; mc mb --ignore-existing local/$$CV_BUILDER_S3_BUCKET; mc anonymous set none local/$$CV_BUILDER_S3_BUCKET; echo 'CV Builder bucket ready';

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parvagas_prod_backend_media:/app/uploads
      - parvagas_prod_backend_static:/app/logs
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-prod-api
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-prod-api.rule=Host(`${API_HOST:-api.parvagas.pt}`)
      - traefik.http.routers.parvagas-prod-api.entrypoints=websecure
      - traefik.http.routers.parvagas-prod-api.tls=true
      - traefik.http.routers.parvagas-prod-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-prod-api.loadbalancer.server.port=8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 --prefetch-multiplier=1 -Q default,emails,parsing,cleanup,scraping
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - parvagas_prod_backend_media:/app/uploads
      - parvagas_prod_backend_static:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  scheduler:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: api-service
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cv-builder:
    build:
      context: ./reactive-resume
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment: *cv-env
    ports:
      - "3050:3000"
    volumes:
      - cv_builder_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully
      cv-builder-bucket-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      default: {}
      traefik:
        aliases:
          - parvagas-cv
          - parvagas-prod-cv
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.parvagas-prod-cv.rule=Host(`${CV_HOST:-cv.parvagas.pt}`)
      - traefik.http.routers.parvagas-prod-cv.priority=200
      - traefik.http.routers.parvagas-prod-cv.entrypoints=websecure
      - traefik.http.routers.parvagas-prod-cv.tls=true
      - traefik.http.routers.parvagas-prod-cv.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.parvagas-prod-cv.loadbalancer.server.port=3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: parvagas-prod_internal
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  parvagas_prod_postgres_data:
  parvagas_prod_redis_data:
  parvagas_prod_minio_data:
  parvagas_prod_backend_media:
  parvagas_prod_backend_static:
  cv_builder_data:
