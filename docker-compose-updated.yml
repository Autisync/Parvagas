services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Python Backend (New)
  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # Celery Worker (Python)
  celery-worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
  # Celery Beat (Python) - Optional scheduler
  celery-beat:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - python-backend-beat

  db-migrator:
    image: postgres:16-alpine
    profiles: ["migration"]
    env_file:
      - ./.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/migrate-old-db.sh:/migrate-old-db.sh:ro
    entrypoint: ["/bin/sh", "/migrate-old-db.sh"]

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@parvagas.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-REDACTED}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  python_uploads:
  minio_data:
  python_logs:
