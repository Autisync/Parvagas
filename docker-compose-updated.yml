services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Python Backend (New)
  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cv-builder-db-init:
    image: postgres:16-alpine
    restart: "no"
    env_file:
      - ./.env.docker
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "psql -h postgres -U ${POSTGRES_USER:-parvagas} -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='parvagas_cv_builder'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER:-parvagas} -d postgres -c \"CREATE DATABASE parvagas_cv_builder\""
      ]

  cv-builder-bucket-init:
    image: minio/mc:latest
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio'; sleep 2; done;
      mc mb --ignore-existing local/reactive-resume;
      mc anonymous set none local/reactive-resume;
      echo 'cv-builder bucket ready';
      "

  cv-builder-migrate:
    build:
      context: ./reactive-resume
      dockerfile: Dockerfile
      target: builder
    restart: "no"
    env_file:
      - ./.env.docker
    environment:
      PORT: "3000"
      SERVER_PORT: "3000"
      NODE_ENV: production
      APP_URL: ${RESUME_BUILDER_URL:-http://localhost:3050}
      AUTH_SECRET: ${RESUME_BUILDER_SECRET}
      DATABASE_URL: ${CV_BUILDER_DATABASE_URL}
    command: ["pnpm", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully

  cv-builder:
    build:
      context: ./reactive-resume
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.docker
    ports:
      - "3050:3000"
    environment:
      PORT: "3000"
      SERVER_PORT: "3000"
      NODE_ENV: production
      APP_URL: ${RESUME_BUILDER_URL:-http://localhost:3050}
      APP_NAME: "Parvagas CV Builder"
      SUPPORT_EMAIL: suporte@parvagas.pt
      SUPPORT_URL: https://parvagas.pt
      DATABASE_URL: ${CV_BUILDER_DATABASE_URL}
      AUTH_SECRET: ${RESUME_BUILDER_SECRET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-${MINIO_ACCESS_KEY:-minioadmin}}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-${MINIO_SECRET_KEY:-minioadmin}}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: reactive-resume
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
      ENCRYPTION_SECRET: ${CV_BUILDER_ENCRYPTION_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${CV_BUILDER_SMTP_FROM:-Parvagas CV Builder <suporte@parvagas.pt>}
      OAUTH_PROVIDER_NAME: ${PARVAGAS_OAUTH_PROVIDER_NAME:-Parvagas}
      OAUTH_CLIENT_ID: ${PARVAGAS_OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${PARVAGAS_OAUTH_CLIENT_SECRET:-}
      OAUTH_DISCOVERY_URL: ${PARVAGAS_OAUTH_DISCOVERY_URL:-}
      OAUTH_SCOPES: "openid profile email"
      FLAG_DISABLE_SIGNUPS: ${CV_BUILDER_DISABLE_SIGNUPS:-false}
      FLAG_DISABLE_EMAIL_AUTH: ${CV_BUILDER_DISABLE_EMAIL_AUTH:-false}
      FLAG_DISABLE_IMAGE_PROCESSING: ${CV_BUILDER_DISABLE_IMAGE_PROCESSING:-false}
      FLAG_DISABLE_API_RATE_LIMIT: "false"
      FLAG_SHOW_SPONSORS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      cv-builder-db-init:
        condition: service_completed_successfully
      cv-builder-bucket-init:
        condition: service_completed_successfully
      cv-builder-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  # Celery Worker (Python)
  celery-worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
  # Celery Beat (Python) - Optional scheduler
  celery-beat:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - ./backend-python/.env
      - ./.env.docker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
      - USE_MINIO_STORAGE=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=parvagas
      - MINIO_REGION=us-east-1
      - RESUME_AI_ENABLED=false
      - RESUME_AI_PROVIDER=openai
      - RESUME_AI_BASE_URL=https://api.openai.com/v1
      - RESUME_AI_API_KEY=
      - RESUME_AI_MODEL=gpt-4.1-mini
      - RESUME_AI_TIMEOUT_SECONDS=30
      - RESUME_AI_ORGANIZATION=
      - RESUME_AI_PROJECT=
      - RESUME_AI_APP_NAME=Parvagas Resume AI
      - RESUME_AI_SITE_URL=http://localhost:3000
      - RESUME_AI_AZURE_API_VERSION=2024-10-21
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - python-backend-beat

  db-migrator:
    image: postgres:16-alpine
    profiles: ["migration"]
    env_file:
      - ./.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/migrate-old-db.sh:/migrate-old-db.sh:ro
    entrypoint: ["/bin/sh", "/migrate-old-db.sh"]

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@parvagas.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-REDACTED}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  python_uploads:
  minio_data:
  python_logs:
