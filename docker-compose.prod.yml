# ─────────────────────────────────────────────────────────────────────────────
# Parvagas — PRODUCTION backend stack for Portainer.
#
# Runs: Redis + FastAPI backend + Celery worker + Celery beat.
# Database is Supabase (via DATABASE_URL) — there is NO local Postgres here.
# The frontend is hosted separately (e.g. parvagas.pt) and is NOT in this stack.
#
# All ${VARS} below are supplied via Portainer's stack "Environment variables"
# box (paste your filled-in .env.prod there). Nothing secret lives in this file.
#
# Put api.parvagas.pt behind your reverse proxy (Nginx Proxy Manager / Traefik)
# pointing at the backend on port 8000, with a Let's Encrypt certificate.
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY}
  MODERATOR_SIGNUP_KEY: ${MODERATOR_SIGNUP_KEY:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@autisync.com}
  # Public URLs / CORS — must match your live frontend + API domains
  FRONTEND_URL: ${FRONTEND_URL:-https://parvagas.pt}
  CORS_ORIGIN: ${CORS_ORIGIN:-https://parvagas.pt}
  BACKEND_URL: ${BACKEND_URL:-https://api.parvagas.pt}
  # Redis / Celery (internal service names)
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  # Storage — Supabase
  STORAGE_PROVIDER: ${STORAGE_PROVIDER:-supabase}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  SUPABASE_BUCKET: ${SUPABASE_BUCKET:-cvs}
  # Observability — Sentry
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  # Captcha — reCAPTCHA Enterprise (score-based)
  CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-recaptcha_enterprise}
  CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-true}
  RECAPTCHA_API_KEY: ${RECAPTCHA_API_KEY}
  RECAPTCHA_PROJECT_ID: ${RECAPTCHA_PROJECT_ID:-parvagas}
  RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
  RECAPTCHA_SCORE_THRESHOLD: ${RECAPTCHA_SCORE_THRESHOLD:-0.5}
  # Auth — Google Sign-In (server-side token verification)
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  # Email (transactional). Use either SMTP_* or EMAIL_* per your provider.
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  EMAIL_REQUIRED: ${EMAIL_REQUIRED:-true}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USER: ${EMAIL_USER:-}
  EMAIL_PASS: ${EMAIL_PASS:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  # Resume parsing (optional)
  RESUME_PARSER_PROVIDER: ${RESUME_PARSER_PROVIDER:-}
  SKIMA_API_KEY: ${SKIMA_API_KEY:-}
  # Uploads
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Published host port. Override BACKEND_HOST_PORT in Portainer if 8000 is taken.
      # NOTE: the live HTTPS frontend (https://parvagas.pt) cannot call a plain-HTTP
      # API — browsers block mixed content. You still need TLS in front of this port
      # (a reverse proxy or Cloudflare) so api.parvagas.pt is served over HTTPS.
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs

  celery-beat:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  python_uploads:
  python_logs:
