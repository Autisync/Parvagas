# ─────────────────────────────────────────────────────────────────────────────
# Parvagas — fully SELF-HOSTED production stack for Portainer.
#
# Runs everything on your server: Postgres + Redis + MinIO (object storage) +
# FastAPI backend + Celery worker/beat + a nightly Postgres backup.
# No Supabase. The frontend stays hosted separately (parvagas.pt).
#
# Routed via your Traefik FILE provider (deploy/traefik/dynamic/parvagas.yml):
#   api.parvagas.pt     -> backend  (network alias: parvagas-backend-api:8000)
#   storage.parvagas.pt -> minio    (network alias: parvagas-storage:9000)
#
# All ${VARS} come from Portainer's stack "Environment variables" (paste .env.prod).
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  # Database — self-hosted Postgres (built from the POSTGRES_* values below)
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-parvagas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-parvagas}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ADMIN_SIGNUP_KEY: ${ADMIN_SIGNUP_KEY}
  MODERATOR_SIGNUP_KEY: ${MODERATOR_SIGNUP_KEY:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@autisync.com}
  # Public URLs / CORS
  FRONTEND_URL: ${FRONTEND_URL:-https://parvagas.pt}
  CORS_ORIGIN: ${CORS_ORIGIN:-https://parvagas.pt,https://www.parvagas.pt}
  BACKEND_URL: ${BACKEND_URL:-https://api.parvagas.pt}
  # Redis / Celery
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  # Storage — self-hosted MinIO (S3-compatible). The endpoint is the PUBLIC URL so
  # presigned download links work in the user's browser. Access/secret = MinIO root.
  STORAGE_PROVIDER: server
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://storage.parvagas.pt}
  S3_BUCKET: ${S3_BUCKET:-cvs}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  S3_REGION: ${S3_REGION:-us-east-1}
  # Observability
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  # Captcha
  CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-recaptcha_enterprise}
  CAPTCHA_REQUIRED: ${CAPTCHA_REQUIRED:-true}
  RECAPTCHA_API_KEY: ${RECAPTCHA_API_KEY}
  RECAPTCHA_PROJECT_ID: ${RECAPTCHA_PROJECT_ID:-parvagas}
  RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
  RECAPTCHA_SCORE_THRESHOLD: ${RECAPTCHA_SCORE_THRESHOLD:-0.5}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  # Email
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  EMAIL_REQUIRED: ${EMAIL_REQUIRED:-true}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USER: ${EMAIL_USER:-}
  EMAIL_PASS: ${EMAIL_PASS:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  RESUME_PARSER_PROVIDER: ${RESUME_PARSER_PROVIDER:-}
  SKIMA_API_KEY: ${SKIMA_API_KEY:-}
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parvagas}
      POSTGRES_USER: ${POSTGRES_USER:-parvagas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      default: {}
      traefik-net:
        aliases:
          - parvagas-storage

  # One-shot: create the bucket on first boot (idempotent), then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-cvs}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'waiting for minio'; sleep 2; done;
      mc mb -p local/$$S3_BUCKET || true;
      echo 'bucket ready';
      "
    restart: "no"

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default: {}
      traefik-net:
        aliases:
          - parvagas-backend-api
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --prefetch-multiplier=1 -Q default,emails,parsing,cleanup
    restart: unless-stopped
    user: "0:0"
    # Override the image's HTTP healthcheck — workers don't serve :8000.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - python_uploads:/app/uploads
      - python_logs:/app/logs

  celery-beat:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped
    user: "0:0"
    # Beat has nothing to ping; disable the image's HTTP healthcheck.
    healthcheck:
      disable: true
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nightly Postgres backups (your durability safety net). Dumps to the pg_backups
  # volume; keeps 7 daily / 4 weekly / 6 monthly. Copy them off-server periodically.
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-parvagas}
      POSTGRES_USER: ${POSTGRES_USER:-parvagas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
    volumes:
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

networks:
  traefik-net:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
  default: {}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  python_uploads:
  python_logs:
  pg_backups:
