name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  reactive-resume-source:
    name: Reactive Resume · Source Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if Reactive Resume is not vendored
        run: |
          test -f reactive-resume/Dockerfile
          test -f reactive-resume/package.json
          test -f reactive-resume/pnpm-lock.yaml
          test -d reactive-resume/apps/server
          test -d reactive-resume/apps/web
          test -d reactive-resume/migrations
          if git ls-files --stage reactive-resume | grep -q '^160000 '; then
            echo "reactive-resume is still a git submodule/gitlink"
            exit 1
          fi
          if test -e reactive-resume/.git; then
            echo "reactive-resume contains nested Git metadata"
            exit 1
          fi
          git ls-files --error-unmatch reactive-resume/Dockerfile reactive-resume/package.json reactive-resume/pnpm-lock.yaml >/dev/null

  compose-portainer-config:
    name: Compose · Portainer Config Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if Portainer CV Builder references public images
        run: |
          if grep -nE 'ghcr\.io/heliotheanalyst/parvagas-cv-builder|amruthpillai/reactive-resume' docker-compose.dev.portainer.yml docker-compose.prod.portainer.yml; then
            echo "Portainer compose files must build the CV Builder from ./reactive-resume."
            exit 1
          fi

      - name: Validate Portainer compose files
        run: |
          docker compose -f docker-compose.dev.portainer.yml config
          docker compose -f docker-compose.prod.portainer.yml config

  frontend:
    name: Frontend · Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: https://parvagas.pt

  backend:
    name: Backend · Pytest · Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python
    env:
      APP_ENV: "test"
      JWT_SECRET: "ci-test-secret-key-that-is-long-enough-1234567890"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      ADMIN_SIGNUP_KEY: "ci-admin-key"
      REDIS_URL: "redis://localhost:6379/15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-python/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Pytest (config, security, migrations, serializers)
        run: pytest -q

  cv-builder:
    name: CV Builder · Typecheck · Test · Build · Docker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reactive-resume
    env:
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reactive_resume_ci
      AUTH_SECRET: ci-cv-builder-auth-secret-please-change-1234567890
      ENCRYPTION_SECRET: ci-cv-builder-encryption-secret-please-change-1234567890
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (CI)
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Docker build (Reactive Resume)
        run: docker build -t parvagas-cv-builder-test ./reactive-resume
        working-directory: ..

      - name: Validate Compose files
        run: |
          docker compose config
          docker compose -f docker-compose.dev.yml config
          docker compose -f docker-compose.dev.portainer.yml config
          docker compose -f docker-compose.prod.portainer.yml config
        working-directory: ..
