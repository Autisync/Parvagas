name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend · Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: https://parvagas.co.ao

  backend:
    name: Backend · Pytest · Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python
    env:
      APP_ENV: "test"
      JWT_SECRET: "ci-test-secret-key-that-is-long-enough-1234567890"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      ADMIN_SIGNUP_KEY: "ci-admin-key"
      REDIS_URL: "redis://localhost:6379/15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-python/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Pytest (config, security, migrations, serializers)
        run: pytest -q
